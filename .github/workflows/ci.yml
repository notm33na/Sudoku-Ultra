# ──────────────────────────────────────────────────────────────────────────────
# Sudoku Ultra — CI/CD Pipeline (GitHub Actions)
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & Type-Check (Node) ────────────────────────────────────────────────
  lint:
    name: Lint & Type-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: cd services/game-service && npx prisma generate

      - name: Lint
        run: npx turbo lint

      - name: Type-check (shared-types)
        run: cd packages/shared-types && npx tsc --noEmit

      - name: Type-check (sudoku-engine)
        run: cd packages/sudoku-engine && npx tsc --noEmit

      - name: Type-check (game-service)
        run: cd services/game-service && npx tsc --noEmit

      - name: Type-check (mobile)
        run: cd apps/mobile && npx tsc --noEmit

  # ── Node.js Tests ───────────────────────────────────────────────────────────
  test-node:
    name: Test (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        package:
          - packages/sudoku-engine
          - services/game-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: cd services/game-service && npx prisma generate

      - name: Build dependencies
        run: npx turbo build

      - name: Run tests
        run: cd ${{ matrix.package }} && npx jest --coverage --passWithNoTests --forceExit
        env:
          NODE_ENV: test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.package == 'packages/sudoku-engine' && 'engine' || 'game-service' }}
          path: ${{ matrix.package }}/coverage/
          if-no-files-found: ignore
          retention-days: 7

  # ── Go Tests (multiplayer service) ─────────────────────────────────────────
  test-go:
    name: Test (multiplayer — Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: services/multiplayer/go.sum

      - name: Download modules
        working-directory: services/multiplayer
        run: go mod download

      - name: Vet
        working-directory: services/multiplayer
        run: go vet ./...

      - name: Test
        working-directory: services/multiplayer
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-multiplayer
          path: services/multiplayer/coverage.out
          if-no-files-found: ignore
          retention-days: 7

  # ── Python Tests (ml-service) ───────────────────────────────────────────────
  test-python:
    name: Test (ml-service — Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/ml-service/requirements.txt

      - name: Install dependencies
        working-directory: services/ml-service
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: services/ml-service
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            -x -q
        env:
          ENV: test
          MLFLOW_TRACKING_URI: ""

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ml-service
          path: services/ml-service/coverage.xml
          if-no-files-found: ignore
          retention-days: 7

  # ── Build ───────────────────────────────────────────────────────────────────
  build:
    name: Build (Node)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: cd services/game-service && npx prisma generate

      - name: Build all packages
        run: npx turbo build

  # ── Docker Build ────────────────────────────────────────────────────────────
  docker:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [test-node, test-go, test-python]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: game-service
            context: .
            dockerfile: services/game-service/Dockerfile
          - service: multiplayer
            context: services/multiplayer
            dockerfile: services/multiplayer/Dockerfile
          - service: ml-service
            context: services/ml-service
            dockerfile: services/ml-service/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: sudoku-ultra/${{ matrix.service }}:latest
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=min
