# ──────────────────────────────────────────────────────────────────────────────
# Sudoku Ultra — CI/CD Pipeline (GitHub Actions)
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & Type-Check ──────────────────────────────────────────────────────
  lint:
    name: Lint & Type-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: cd services/game-service && npx prisma generate

      - name: Lint
        run: npx turbo lint

      - name: Type-check (shared-types)
        run: cd packages/shared-types && npx tsc --noEmit

      - name: Type-check (sudoku-engine)
        run: cd packages/sudoku-engine && npx tsc --noEmit

      - name: Type-check (game-service)
        run: cd services/game-service && npx tsc --noEmit

      - name: Type-check (mobile)
        run: cd apps/mobile && npx tsc --noEmit

  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: cd services/game-service && npx prisma generate

      - name: Build all packages
        run: npx turbo build

  # ── Test ───────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        package:
          - packages/sudoku-engine
          - services/game-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: cd services/game-service && npx prisma generate

      - name: Build dependencies
        run: npx turbo build

      - name: Run tests
        run: cd ${{ matrix.package }} && npx jest --coverage --passWithNoTests --forceExit
        env:
          NODE_ENV: test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.package == 'packages/sudoku-engine' && 'engine' || 'game-service' }}
          path: ${{ matrix.package }}/coverage/
          if-no-files-found: ignore
          retention-days: 7

  # ── Docker Build ───────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build game-service image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/game-service/Dockerfile
          push: false
          tags: sudoku-ultra/game-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
