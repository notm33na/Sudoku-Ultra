# ──────────────────────────────────────────────────────────────────────────────
# Sudoku Ultra — CI/CD Pipeline (GitHub Actions)  v0.4.0
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/sudoku-ultra

jobs:
  # ── Lint & Type-Check (Node) ─────────────────────────────────────────────────
  lint:
    name: Lint & Type-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: cd services/game-service && npx prisma generate

      - name: Lint
        run: npx turbo lint

      - name: Type-check (shared-types)
        run: cd packages/shared-types && npx tsc --noEmit

      - name: Type-check (sudoku-engine)
        run: cd packages/sudoku-engine && npx tsc --noEmit

      - name: Type-check (game-service)
        run: cd services/game-service && npx tsc --noEmit

      - name: Type-check (mobile)
        run: cd apps/mobile && npx tsc --noEmit

  # ── Helm Lint ─────────────────────────────────────────────────────────────────
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Helm lint
        run: |
          helm lint infra/helm/sudoku-ultra \
            --set global.jwtSecret=ci-secret \
            --set global.postgresUrl=postgresql://u:p@host/db

      - name: Helm template (render check)
        run: |
          helm template sudoku-ultra infra/helm/sudoku-ultra \
            --set global.jwtSecret=ci-secret \
            --set global.postgresUrl=postgresql://u:p@host/db \
            > /dev/null

  # ── Terraform Validate ────────────────────────────────────────────────────────
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: Terraform init (backend-less)
        working-directory: infra/terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate

      - name: Terraform format check
        working-directory: infra/terraform
        run: terraform fmt -check -recursive

  # ── Node.js Tests ─────────────────────────────────────────────────────────────
  test-node:
    name: Test (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        package:
          - packages/sudoku-engine
          - services/game-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: cd services/game-service && npx prisma generate

      - name: Build dependencies
        run: npx turbo build

      - name: Run tests
        run: cd ${{ matrix.package }} && npx jest --coverage --passWithNoTests --forceExit
        env:
          NODE_ENV: test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.package == 'packages/sudoku-engine' && 'engine' || 'game-service' }}
          path: ${{ matrix.package }}/coverage/
          if-no-files-found: ignore
          retention-days: 7

  # ── Go Tests (multiplayer service) ───────────────────────────────────────────
  test-go:
    name: Test (multiplayer — Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: services/multiplayer/go.sum

      - name: Download modules
        working-directory: services/multiplayer
        run: go mod download

      - name: Vet
        working-directory: services/multiplayer
        run: go vet ./...

      - name: Test
        working-directory: services/multiplayer
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-multiplayer
          path: services/multiplayer/coverage.out
          if-no-files-found: ignore
          retention-days: 7

  # ── Python Tests (ml-service) ─────────────────────────────────────────────────
  test-python:
    name: Test (ml-service — Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/ml-service/requirements.txt

      - name: Install dependencies
        working-directory: services/ml-service
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: services/ml-service
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            -x -q
        env:
          ENV: test
          MLFLOW_TRACKING_URI: ""

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ml-service
          path: services/ml-service/coverage.xml
          if-no-files-found: ignore
          retention-days: 7

  # ── Pact Consumer Contract Tests ──────────────────────────────────────────────
  pact-consumer:
    name: Pact Consumer Contracts
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Pact consumer tests
        run: npx jest --config pact/jest.config.js --testPathPattern=consumer
        env:
          NODE_ENV: test

      - name: Upload pact files
        uses: actions/upload-artifact@v4
        with:
          name: pact-files
          path: pact/pacts/
          retention-days: 14

  # ── Build ─────────────────────────────────────────────────────────────────────
  build:
    name: Build (Node)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: cd services/game-service && npx prisma generate

      - name: Build all packages
        run: npx turbo build

  # ── Docker Build & Push (main only) ──────────────────────────────────────────
  docker:
    name: Docker (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [test-node, test-go, test-python, helm-lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write    # for cosign OIDC signing
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: game-service
            context: .
            dockerfile: services/game-service/Dockerfile
          - service: multiplayer
            context: services/multiplayer
            dockerfile: services/multiplayer/Dockerfile
          - service: ml-service
            context: services/ml-service
            dockerfile: services/ml-service/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push ${{ matrix.service }}
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign (keyless OIDC)
        run: |
          cosign sign --yes \
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}

  # ── Update Helm image tag & trigger ArgoCD ────────────────────────────────────
  deploy:
    name: Deploy (ArgoCD sync)
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_PAT }}

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Update image tag in values.yaml
        run: |
          sed -i "s/^  tag: .*/  tag: sha-${{ steps.sha.outputs.short }}/" \
            infra/helm/sudoku-ultra/values.yaml

      - name: Commit updated image tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/helm/sudoku-ultra/values.yaml
          git commit -m "chore: update image tag to sha-${{ steps.sha.outputs.short }} [skip ci]"
          git push

      - name: Trigger ArgoCD sync
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${ARGOCD_AUTH_TOKEN}" \
            "${ARGOCD_SERVER}/api/v1/applications/sudoku-ultra/sync" \
            -d '{"prune":true,"dryRun":false}' \
            --fail-with-body

  # ── k6 Smoke Test (post-deploy) ───────────────────────────────────────────────
  smoke:
    name: k6 Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up k6
        uses: grafana/setup-k6-action@v1

      - name: Run smoke test
        env:
          BASE_URL: ${{ secrets.PROD_BASE_URL }}
          ML_URL: ${{ secrets.PROD_ML_URL }}
          AUTH_TOKEN: ${{ secrets.SMOKE_AUTH_TOKEN }}
        run: k6 run k6/scripts/smoke.js
