# ──────────────────────────────────────────────────────────────────────────────
# Sudoku Ultra — Release Pipeline  v0.5.0
#
# Triggers:
#   - Push to main (after CI passes — use branch protection)
#   - Manual dispatch with optional version bump override
#
# Flow:
#   1. Pact contract verification gate (blocks release if any contract fails)
#   2. Compute next semver from conventional commits
#   3. Generate CHANGELOG via git-cliff
#   4. Tag the release commit (vX.Y.Z)
#   5. Build & push Docker images tagged with semver + latest
#   6. Sign all images with cosign
#   7. Create GitHub Release with generated changelog
#   8. Trigger Expo EAS production build (iOS + Android)
#   9. ArgoCD production sync with semver tag
# ──────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (overrides auto-detect)'
        required: false
        default: ''
        type: choice
        options: ['', 'patch', 'minor', 'major']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # never cancel a release in flight

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/sudoku-ultra

jobs:
  # ── Pact Contract Gate ────────────────────────────────────────────────────────
  pact-gate:
    name: Pact Contract Gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sudoku
          POSTGRES_PASSWORD: sudoku_test
          POSTGRES_DB: sudoku_ultra_pact
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: cd services/game-service && npx prisma generate

      - name: Run Prisma migrations
        working-directory: services/game-service
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://sudoku:sudoku_test@localhost:5432/sudoku_ultra_pact

      - name: Run all Pact consumer tests
        run: npx jest --config pact/jest.config.js --testPathPattern=consumer --forceExit
        env:
          NODE_ENV: test

      - name: Build game-service
        run: cd services/game-service && npx tsc

      - name: Start game-service for provider verification
        run: |
          cd services/game-service && node dist/server.js &
          echo $! > /tmp/game-service.pid
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/health && break
            sleep 2
          done
        env:
          NODE_ENV: test
          PORT: 3001
          DATABASE_URL: postgresql://sudoku:sudoku_test@localhost:5432/sudoku_ultra_pact
          JWT_SECRET: release-gate-jwt-secret-32-chars!
          JWT_REFRESH_SECRET: release-gate-refresh-secret-32!!
          ML_SERVICE_URL: http://localhost:3003

      - name: Run all Pact provider verifications
        run: npx jest --config pact/jest.config.js --testPathPattern=provider --forceExit
        env:
          NODE_ENV: test
          PACT_PROVIDER_URL: http://localhost:3001
          GIT_SHA: ${{ github.sha }}

      - name: Stop game-service
        if: always()
        run: kill $(cat /tmp/game-service.pid) 2>/dev/null || true

  # ── Compute Version ───────────────────────────────────────────────────────────
  version:
    name: Compute Next Version
    runs-on: ubuntu-latest
    needs: pact-gate
    outputs:
      version: ${{ steps.semver.outputs.version }}
      tag: ${{ steps.semver.outputs.tag }}
      changelog: ${{ steps.cliff.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for conventional commit parsing

      - name: Install git-cliff
        run: |
          curl -sSL \
            https://github.com/orhun/git-cliff/releases/download/v2.4.0/git-cliff-2.4.0-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /usr/local/bin --strip-components=1 git-cliff-2.4.0/git-cliff

      - name: Get current version from package.json
        id: current
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Determine next semver
        id: semver
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          BUMP="${{ github.event.inputs.bump }}"

          # If bump is explicitly set, use it; otherwise auto-detect from commits
          if [ -n "$BUMP" ]; then
            TYPE="$BUMP"
          else
            # Detect bump type from conventional commits since last tag
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -z "$LAST_TAG" ]; then
              COMMITS=$(git log --pretty=format:"%s" | head -50)
            else
              COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s")
            fi

            if echo "$COMMITS" | grep -qE "^(feat|fix|refactor|perf|build|ci)(\(.+\))?!:|^BREAKING CHANGE"; then
              TYPE="major"
            elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
              TYPE="minor"
            else
              TYPE="patch"
            fi
          fi

          # Increment version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${NEXT}" >> $GITHUB_OUTPUT
          echo "tag=v${NEXT}" >> $GITHUB_OUTPUT
          echo "Bumping ${TYPE}: ${CURRENT} → ${NEXT}"

      - name: Generate CHANGELOG with git-cliff
        id: cliff
        run: |
          # Generate changelog for this release
          git-cliff --latest --strip all --output CHANGELOG_RELEASE.md \
            --tag ${{ steps.semver.outputs.tag }} || \
            git-cliff --unreleased --strip all --output CHANGELOG_RELEASE.md \
              --tag ${{ steps.semver.outputs.tag }} || \
            echo "## ${{ steps.semver.outputs.tag }}\n\nRelease ${{ steps.semver.outputs.version }}" \
              > CHANGELOG_RELEASE.md

          # Full cumulative changelog
          git-cliff --output CHANGELOG.md || true

          CONTENT=$(cat CHANGELOG_RELEASE.md)
          # Use multiline output trick
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: |
            CHANGELOG_RELEASE.md
            CHANGELOG.md
          retention-days: 30

  # ── Tag & Update Version ──────────────────────────────────────────────────────
  tag:
    name: Tag Release
    runs-on: ubuntu-latest
    needs: version
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_PAT }}
          fetch-depth: 0

      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: changelog

      - name: Update package.json version
        run: |
          npm version ${{ needs.version.outputs.version }} --no-git-tag-version
          # Also update apps/mobile/package.json if it exists
          if [ -f apps/mobile/package.json ]; then
            cd apps/mobile && npm version ${{ needs.version.outputs.version }} --no-git-tag-version
          fi

      - name: Commit version bump + CHANGELOG
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          [ -f apps/mobile/package.json ] && git add apps/mobile/package.json || true
          git commit -m "chore(release): ${{ needs.version.outputs.tag }} [skip ci]"
          git tag -a ${{ needs.version.outputs.tag }} \
            -m "Release ${{ needs.version.outputs.tag }}"
          git push origin main --follow-tags

  # ── Docker — Semver Tagged Images ─────────────────────────────────────────────
  docker-release:
    name: Docker Release — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [version, tag]
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: game-service
            context: .
            dockerfile: services/game-service/Dockerfile
          - service: multiplayer
            context: services/multiplayer
            dockerfile: services/multiplayer/Dockerfile
          - service: ml-service
            context: services/ml-service
            dockerfile: services/ml-service/Dockerfile
          - service: notifications
            context: services/notifications
            dockerfile: services/notifications/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.version.outputs.tag }}
            type=raw,value=latest

      - name: Build & push ${{ matrix.service }}
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.service }}-release
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-release

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless OIDC)
        run: |
          cosign sign --yes \
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}

  # ── GitHub Release ────────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [version, docker-release]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: changelog

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const changelog = fs.readFileSync('CHANGELOG_RELEASE.md', 'utf8');
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ needs.version.outputs.tag }}',
              name: 'Sudoku Ultra ${{ needs.version.outputs.tag }}',
              body: changelog,
              draft: false,
              prerelease: false,
            });

  # ── Expo EAS Production Build ─────────────────────────────────────────────────
  eas-build:
    name: Expo EAS Production Build
    runs-on: ubuntu-latest
    needs: [version, tag]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS build (iOS + Android) — production
        working-directory: apps/mobile
        run: |
          eas build \
            --platform all \
            --profile production \
            --non-interactive \
            --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  # ── ArgoCD Production Sync with Semver ───────────────────────────────────────
  argocd-release:
    name: ArgoCD Release Sync
    runs-on: ubuntu-latest
    needs: [version, docker-release]
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_PAT }}
          ref: main

      - name: Update image tag to semver in values.yaml
        run: |
          sed -i "s/^  tag: .*/  tag: ${{ needs.version.outputs.version }}/" \
            infra/helm/sudoku-ultra/values.yaml
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/helm/sudoku-ultra/values.yaml
          git diff --cached --quiet || \
            git commit -m "chore: set image tag to ${{ needs.version.outputs.version }} [skip ci]"
          git push || true

      - name: Trigger ArgoCD sync
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${ARGOCD_AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            "${ARGOCD_SERVER}/api/v1/applications/sudoku-ultra/sync" \
            -d '{"prune":true,"dryRun":false}' \
            --fail-with-body
