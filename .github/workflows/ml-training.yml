# GitHub Actions workflow: ML Model Training
#
# Triggers: manual dispatch, weekly schedule, or when training code changes.
# Trains all ML models, runs tests, and uploads artifacts.

name: ML Model Training

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Model to train (all, classifier, regression, scanner, clustering, churn)'
        required: true
        default: 'all'
      n_samples:
        description: 'Number of training samples'
        required: false
        default: '10000'
  schedule:
    - cron: '0 2 * * 0'  # Weekly Sunday 2am UTC
  push:
    paths:
      - 'services/ml-service/app/ml/**'
      - 'services/ml-service/requirements.txt'

jobs:
  train:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ml-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: services/ml-service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install skl2onnx

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Train difficulty classifier
        if: inputs.model == 'all' || inputs.model == 'classifier'
        run: python -m app.ml.train_classifier

      - name: Train adaptive regression
        if: inputs.model == 'all' || inputs.model == 'regression'
        run: python -m app.ml.train_regression

      - name: Train digit scanner
        if: inputs.model == 'all' || inputs.model == 'scanner'
        run: python -m app.ml.train_scanner

      - name: Train skill clustering
        if: inputs.model == 'all' || inputs.model == 'clustering'
        run: python -m app.ml.train_clustering

      - name: Train churn predictor
        if: inputs.model == 'all' || inputs.model == 'churn'
        run: python -m app.ml.train_churn

      - name: Export ONNX models
        if: inputs.model == 'all' || inputs.model == 'classifier' || inputs.model == 'scanner'
        run: python -m app.ml.export_onnx

      - name: Run post-training tests
        run: python -m pytest tests/ -v --tb=short

      - name: Register and promote trained models
        run: |
          python - <<'EOF'
          import os
          import pathlib
          import sys

          # Ensure the app package is importable from services/ml-service
          sys.path.insert(0, str(pathlib.Path.cwd()))

          from app.services.model_version_registry import ModelVersionRegistry

          sha = os.environ.get("GITHUB_SHA", "unknown")[:8]
          version = f"ci-{sha}"

          # Canonical artifact paths — must match what each train_*.py actually saves.
          model_map = {
              "difficulty-classifier": "ml/models/difficulty_classifier.pkl",
              "adaptive-difficulty":   "ml/models/adaptive_regression.pkl",
              "digit-scanner":         "ml/models/scanner.pt",
              "skill-clustering":      "ml/models/skill_clustering.pkl",
              "churn-predictor":       "ml/models/churn_predictor.pkl",
          }

          registry = ModelVersionRegistry()

          for name, path in model_map.items():
              if not pathlib.Path(path).exists():
                  print(f"  – {name}: artifact not found at {path}, skipping")
                  continue

              # Register in staging first; promote() handles archiving previous production.
              registry.register_model(
                  name=name,
                  version=version,
                  model_path=path,
                  metrics={},
                  stage="staging",
                  tags={"trigger": "ci", "sha": sha},
              )
              registry.promote(name, version, "production")
              print(f"  ✓ {name}@{version} → production")

          print(f"Manifest saved: {registry.manifest_path}")
          EOF

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ml-models-${{ github.sha }}
          path: |
            services/ml-service/ml/models/
          retention-days: 30
