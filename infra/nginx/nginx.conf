# ──────────────────────────────────────────────────────────────────────────────
# Sudoku Ultra — Nginx API Gateway
#
# Port map (internal Docker network):
#   game-service     → 3001
#   multiplayer      → 3002
#   ml-service       → 3003
#   notification     → 3004
#   web-admin        → 3005
#
# External routes (via :80):
#   /health          → gateway health
#   /api/*           → game-service (REST + rating + internal)
#   /graphql         → game-service (Apollo GraphQL)
#   /rooms/*/ws      → multiplayer (WebSocket — upgraded)
#   /rooms/*         → multiplayer (room REST API)
#   /ml/*            → ml-service  (prefix stripped: /ml/foo → /foo)
#   /admin/*         → web-admin   (prefix stripped: /admin/foo → /foo)
# ──────────────────────────────────────────────────────────────────────────────

worker_processes auto;

events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/json;

    # ── Logging ────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── WebSocket connection upgrade map ───────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Timeouts (default — overridden per-location for WebSocket) ─────────────
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
    proxy_buffering       off;

    # ── Upstream pools ─────────────────────────────────────────────────────────
    upstream game_service {
        server game-service:3001;
        keepalive 16;
    }

    upstream multiplayer_service {
        server multiplayer:3002;
        keepalive 16;
    }

    upstream ml_service {
        server ml-service:3003;
        keepalive 8;
    }

    upstream web_admin {
        server web-admin:3005;
        keepalive 8;
    }

    # ── Common proxy headers (shared snippet) ──────────────────────────────────
    # Used with `include` is not available in bare nginx; use a map + repeated headers instead.

    server {
        listen 80;
        server_name localhost;

        # ── Gateway health ────────────────────────────────────────────────────
        location = /health {
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        # ── GraphQL endpoint (Apollo Server 4 on game-service) ────────────────
        location = /graphql {
            proxy_pass         http://game_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── Multiplayer WebSocket ─────────────────────────────────────────────
        # Matches /rooms/<uuid>/ws — must come before the REST /rooms block.
        location ~ ^/rooms/[^/]+/ws$ {
            proxy_pass         http://multiplayer_service;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Keep WebSocket connections alive for up to 1 h of inactivity.
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Multiplayer REST ──────────────────────────────────────────────────
        # POST /rooms, GET /rooms/:id, POST /rooms/:id/join
        location /rooms {
            proxy_pass         http://multiplayer_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── Game Service API ──────────────────────────────────────────────────
        # Covers /api/*, including /api/ratings/* (D4) and /api/home (P2)
        location /api/ {
            proxy_pass         http://game_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── ML Service API ────────────────────────────────────────────────────
        # Strip /ml prefix: /ml/api/v1/classify → /api/v1/classify on ml-service.
        location /ml/ {
            rewrite            ^/ml/(.*)$ /$1 break;
            proxy_pass         http://ml_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            # ML inference can be slow; allow 120 s.
            proxy_read_timeout 120s;
        }

        # ── Admin Dashboard ───────────────────────────────────────────────────
        location = /admin {
            return 301 /admin/;
        }

        location /admin/ {
            rewrite            ^/admin/(.*)$ /$1 break;
            proxy_pass         http://web_admin;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── Default ───────────────────────────────────────────────────────────
        location / {
            return 404 '{"error":"not_found","message":"Unknown route"}';
            add_header Content-Type application/json;
        }
    }
}
