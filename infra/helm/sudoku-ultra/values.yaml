# ──────────────────────────────────────────────────────────────────────────────
# Sudoku Ultra — Helm Values  (v0.4.0)
# Override with: helm upgrade --install sudoku-ultra ./infra/helm/sudoku-ultra \
#   -f my-values.yaml
# ──────────────────────────────────────────────────────────────────────────────

# ── Image registry ────────────────────────────────────────────────────────────
image:
  registry: ghcr.io/sudoku-ultra
  pullPolicy: IfNotPresent
  tag: latest

# ── Global secrets (use Vault in production — values here are dev defaults) ───
global:
  jwtSecret: "dev-jwt-secret-change-in-production"
  internalSecret: "dev-internal-secret-change-in-production"
  postgresUrl: "postgresql://sudoku:sudoku_dev_password@postgres:5432/sudoku_ultra"
  redisUrl: "redis://redis:6379"
  kafkaBrokers: "kafka:9092"
  qdrantUrl: "http://qdrant:6333"
  ollamaUrl: "http://ollama:11434"
  sentryDsn: ""  # set per-env in CI secrets

# ── Network Policies ─────────────────────────────────────────────────────────
networkPolicy:
  enabled: false   # enable in prod for zero-trust pod networking

# ── Pod Security ──────────────────────────────────────────────────────────────
podSecurity:
  # Applied to all application containers (game-service, multiplayer, ml-service)
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  readOnlyRootFilesystem: false   # set true per-service once tested
  allowPrivilegeEscalation: false
  dropCapabilities:
    - ALL

# ── Vault integration ─────────────────────────────────────────────────────────
vault:
  enabled: false   # enable to inject Vault agent init containers
  address: "https://vault.example.com"
  role: "sudoku-ultra"
  authPath: "auth/kubernetes"

# ── Service Account ───────────────────────────────────────────────────────────
serviceAccount:
  create: true
  name: ""          # defaults to {{ .Release.Name }}
  annotations: {}   # add eks.amazonaws.com/role-arn for IRSA

# ── game-service ──────────────────────────────────────────────────────────────
gameService:
  enabled: true
  replicaCount: 2
  image:
    name: game-service
  service:
    port: 3001
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1
  env:
    NODE_ENV: production
    PORT: "3001"
    ML_SERVICE_URL: "http://ml-service:3003"

# ── multiplayer ───────────────────────────────────────────────────────────────
multiplayer:
  enabled: true
  replicaCount: 2
  image:
    name: multiplayer
  service:
    port: 3002
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1
  env:
    PORT: "3002"
    LOG_LEVEL: info
    MAX_ROOM_PLAYERS: "2"
    COUNTDOWN_SECS: "3"
    RECONNECT_WINDOW_SECS: "30"
    MATCHMAKE_QUEUE_KEY: "multiplayer:matchmaking"
    GAME_SERVICE_URL: "http://game-service:3001"
    ML_SERVICE_URL: "http://ml-service:3003"
    BOT_SERVICE_URL: "http://ml-service:3003"

# ── ml-service ────────────────────────────────────────────────────────────────
mlService:
  enabled: true
  replicaCount: 1
  image:
    name: ml-service
  service:
    port: 3003
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 75
  pdb:
    enabled: true
    minAvailable: 1
  nodeTolerations:
    - key: workload
      operator: Equal
      value: ml
      effect: NoSchedule
  nodeSelector:
    workload: ml
  env:
    PORT: "3003"
    ENV: production
    LOG_LEVEL: INFO
    ANOMALY_ENRICH: "1"
    COMPETITIVE_DUCKDB_PATH: /data/competitive.duckdb
    EVENTS_DIR: /data/events
    MLFLOW_S3_ENDPOINT_URL: "http://minio:9000"
  persistence:
    models:
      size: 2Gi
      storageClass: ""
    data:
      size: 5Gi
      storageClass: ""

# ── kafka-consumer ────────────────────────────────────────────────────────────
kafkaConsumer:
  enabled: true
  replicaCount: 1
  image:
    name: ml-service
  command: ["python", "-m", "app.ml.kafka_consumer"]
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi
  env:
    KAFKA_GROUP_ID: ml-service-enrichment
    ANOMALY_ENRICH: "1"
    EVENTS_DIR: /data/events

# ── nginx (api-gateway) ───────────────────────────────────────────────────────
nginx:
  enabled: true
  replicaCount: 2
  image:
    repository: nginx
    tag: 1.25-alpine
  service:
    type: LoadBalancer
    port: 80
    httpsPort: 443
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 60
  pdb:
    enabled: true
    minAvailable: 1

# ── Qdrant (vector DB) ────────────────────────────────────────────────────────
qdrant:
  enabled: true
  image:
    repository: qdrant/qdrant
    tag: v1.10.1
  service:
    httpPort: 6333
    grpcPort: 6334
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  persistence:
    size: 5Gi
    storageClass: ""

# ── MinIO (S3-compatible artifact store) ──────────────────────────────────────
minio:
  enabled: true
  image:
    repository: minio/minio
    tag: RELEASE.2024-07-04T14-25-45Z
  service:
    apiPort: 9000
    consolePort: 9001
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  persistence:
    size: 20Gi
    storageClass: ""
  # Buckets created at startup via initContainers (mc)
  buckets:
    - mlflow-artifacts
    - training-data
    - model-exports
  # Credentials — override via --set or Vault in production
  rootUser: minioadmin
  rootPassword: minioadmin

# ── Ollama (local LLM) ────────────────────────────────────────────────────────
ollama:
  enabled: false   # disabled in prod — use HuggingFace endpoint instead
  image:
    repository: ollama/ollama
    tag: 0.3.12
  service:
    port: 11434
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 8Gi
  persistence:
    size: 20Gi
    storageClass: ""

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
  host: sudoku-ultra.example.com
  tls:
    - secretName: sudoku-ultra-tls
      hosts:
        - sudoku-ultra.example.com

# ── PostgreSQL sub-chart ──────────────────────────────────────────────────────
postgresql:
  enabled: true
  auth:
    username: sudoku
    password: sudoku_dev_password
    database: sudoku_ultra
  primary:
    persistence:
      size: 10Gi

# ── Redis sub-chart ───────────────────────────────────────────────────────────
redis:
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      size: 1Gi

# ── Prometheus ────────────────────────────────────────────────────────────────
prometheus:
  enabled: false   # enable in prod
  image:
    repository: prom/prometheus
    tag: v2.53.1
  retention: 15d
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""

# ── Grafana ────────────────────────────────────────────────────────────────────
grafana:
  enabled: false   # enable in prod
  image:
    repository: grafana/grafana
    tag: "11.1.3"
  adminUser: admin
  adminPassword: changeme   # override via --set or Vault
  rootUrl: "%(protocol)s://%(domain)s:%(http_port)s/"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  persistence:
    enabled: true
    size: 2Gi
    storageClass: ""

# ── OpenTelemetry Collector ────────────────────────────────────────────────────
otelCollector:
  enabled: false   # enable in prod
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: 0.103.0
  memoryLimitMib: 512
  memorySpikeLimitMib: 128
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 512Mi

# ── Alertmanager ──────────────────────────────────────────────────────────────
alertmanager:
  enabled: false   # enable in prod alongside prometheus

# ── Observability (Loki stack sub-chart) ─────────────────────────────────────
loki:
  enabled: false   # enable in prod
  grafana:
    enabled: true
    adminPassword: changeme
  promtail:
    enabled: true
  loki:
    persistence:
      enabled: true
      size: 10Gi

# ── Jaeger tracing ────────────────────────────────────────────────────────────
jaeger:
  enabled: false   # enable in prod
  image:
    repository: jaegertracing/all-in-one
    tag: "1.58"
  service:
    queryPort: 16686
    collectorPort: 4317  # OTLP gRPC
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
