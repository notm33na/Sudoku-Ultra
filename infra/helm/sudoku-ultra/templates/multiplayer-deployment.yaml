{{- if .Values.multiplayer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-multiplayer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sudoku-ultra.labels" . | nindent 4 }}
    app.kubernetes.io/component: multiplayer
  {{- if .Values.vault.enabled }}
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: {{ .Values.vault.role | quote }}
    vault.hashicorp.com/agent-inject-secret-config: "secret/data/sudoku-ultra/multiplayer"
    vault.hashicorp.com/agent-inject-template-config: |
      {{`{{- with secret "secret/data/sudoku-ultra/multiplayer" -}}
      export JWT_SECRET="{{ .Data.data.jwt_secret }}"
      export DATABASE_URL="{{ .Data.data.database_url }}"
      export REDIS_URL="{{ .Data.data.redis_url }}"
      export SENTRY_DSN="{{ .Data.data.sentry_dsn }}"
      {{- end }}`}}
  {{- end }}
spec:
  replicas: {{ .Values.multiplayer.replicaCount }}
  selector:
    matchLabels:
      {{- include "sudoku-ultra.selectorLabels" (dict "component" "multiplayer" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sudoku-ultra.selectorLabels" (dict "component" "multiplayer" "root" .) | nindent 8 }}
    spec:
      serviceAccountName: {{ include "sudoku-ultra.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: {{ .Values.podSecurity.runAsNonRoot }}
        runAsUser:    {{ .Values.podSecurity.runAsUser }}
        runAsGroup:   {{ .Values.podSecurity.runAsGroup }}
        fsGroup:      {{ .Values.podSecurity.fsGroup }}
      containers:
        - name: multiplayer
          image: {{ include "sudoku-ultra.image" (dict "name" .Values.multiplayer.image.name "root" .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: {{ .Values.podSecurity.allowPrivilegeEscalation }}
            readOnlyRootFilesystem:   {{ .Values.podSecurity.readOnlyRootFilesystem }}
            capabilities:
              drop: {{- toYaml .Values.podSecurity.dropCapabilities | nindent 16 }}
          ports:
            - name: http
              containerPort: {{ .Values.multiplayer.service.port }}
              protocol: TCP
          env:
            {{- include "sudoku-ultra.globalEnv" . | nindent 12 }}
            {{- range $k, $v := .Values.multiplayer.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.multiplayer.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.multiplayer.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.multiplayer.resources | nindent 12 }}
{{- end }}
