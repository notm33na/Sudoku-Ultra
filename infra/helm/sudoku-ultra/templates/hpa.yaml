{{/* HPA for game-service */}}
{{- if and .Values.gameService.enabled .Values.gameService.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-game-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sudoku-ultra.labels" . | nindent 4 }}
    app.kubernetes.io/component: game-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-game-service
  minReplicas: {{ .Values.gameService.hpa.minReplicas }}
  maxReplicas: {{ .Values.gameService.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.gameService.hpa.targetCPUUtilizationPercentage }}
{{- end }}
