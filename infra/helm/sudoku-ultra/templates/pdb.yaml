{{- if and .Values.gameService.enabled .Values.gameService.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-game-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sudoku-ultra.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.gameService.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "sudoku-ultra.selectorLabels" (dict "component" "game-service" "root" .) | nindent 6 }}
{{- end }}
---
