{{- if .Values.multiplayer.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-multiplayer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sudoku-ultra.labels" . | nindent 4 }}
    app.kubernetes.io/component: multiplayer
spec:
  type: ClusterIP
  selector:
    {{- include "sudoku-ultra.selectorLabels" (dict "component" "multiplayer" "root" .) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.multiplayer.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
