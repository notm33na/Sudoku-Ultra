{{- if .Values.nginx.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-nginx-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sudoku-ultra.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
data:
  nginx.conf: |
    worker_processes auto;

    events {
        worker_connections 4096;
    }

    http {
        include       /etc/nginx/mime.types;
        default_type  application/json;

        access_log /var/log/nginx/access.log;
        error_log  /var/log/nginx/error.log warn;

        map $http_upgrade $connection_upgrade {
            default upgrade;
            ''      close;
        }

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_buffering       off;

        upstream game_service {
            server game-service:3001;
            keepalive 16;
        }

        upstream multiplayer_service {
            server multiplayer:3002;
            keepalive 16;
        }

        upstream ml_service {
            server ml-service:3003;
            keepalive 8;
        }

        server {
            listen 80;
            server_name _;

            location = /health {
                return 200 '{"status":"ok","service":"api-gateway"}';
                add_header Content-Type application/json;
            }

            location = /graphql {
                proxy_pass         http://game_service;
                proxy_http_version 1.1;
                proxy_set_header   Host              $host;
                proxy_set_header   X-Real-IP         $remote_addr;
                proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Proto $scheme;
                proxy_set_header   Connection        "";
            }

            location ~ ^/rooms/[^/]+/ws$ {
                proxy_pass         http://multiplayer_service;
                proxy_http_version 1.1;
                proxy_set_header   Upgrade           $http_upgrade;
                proxy_set_header   Connection        $connection_upgrade;
                proxy_set_header   Host              $host;
                proxy_set_header   X-Real-IP         $remote_addr;
                proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Proto $scheme;
                proxy_read_timeout 3600s;
                proxy_send_timeout 3600s;
            }

            location /rooms {
                proxy_pass         http://multiplayer_service;
                proxy_http_version 1.1;
                proxy_set_header   Host              $host;
                proxy_set_header   X-Real-IP         $remote_addr;
                proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Proto $scheme;
                proxy_set_header   Connection        "";
            }

            location /api/ {
                proxy_pass         http://game_service;
                proxy_http_version 1.1;
                proxy_set_header   Host              $host;
                proxy_set_header   X-Real-IP         $remote_addr;
                proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Proto $scheme;
                proxy_set_header   Connection        "";
            }

            location /ml/ {
                rewrite            ^/ml/(.*)$ /$1 break;
                proxy_pass         http://ml_service;
                proxy_http_version 1.1;
                proxy_set_header   Host              $host;
                proxy_set_header   X-Real-IP         $remote_addr;
                proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Proto $scheme;
                proxy_set_header   Connection        "";
                proxy_read_timeout 120s;
            }

            location / {
                return 404 '{"error":"not_found","message":"Unknown route"}';
                add_header Content-Type application/json;
            }
        }
    }
{{- end }}
