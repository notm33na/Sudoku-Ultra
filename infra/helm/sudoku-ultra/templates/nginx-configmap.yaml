{{- if .Values.nginx.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-nginx-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sudoku-ultra.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
data:
  nginx.conf: |
    worker_processes auto;

    events {
        worker_connections 4096;
    }

    http {
        include       /etc/nginx/mime.types;
        default_type  application/json;

        access_log /var/log/nginx/access.log;
        error_log  /var/log/nginx/error.log warn;

        map $http_upgrade $connection_upgrade {
            default upgrade;
            ''      close;
        }

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_buffering       off;

        # ── Security headers (applied globally) ──────────────────────────────
        add_header X-Content-Type-Options    "nosniff"           always;
        add_header X-Frame-Options           "DENY"              always;
        add_header X-XSS-Protection          "1; mode=block"     always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'none';"
            always;
        add_header Cross-Origin-Opener-Policy   "same-origin"    always;
        add_header Cross-Origin-Resource-Policy "same-origin"    always;
        # Remove server banner
        server_tokens off;

        # ── Rate limiting ─────────────────────────────────────────────────────
        # Zones defined at http-level and referenced per-location.
        # Auth endpoints: 10 req/min burst=5; API: 100 req/min burst=20
        limit_req_zone $binary_remote_addr zone=auth_limit:10m   rate=10r/m;
        limit_req_zone $binary_remote_addr zone=api_limit:20m    rate=100r/m;
        limit_req_zone $binary_remote_addr zone=ws_limit:5m      rate=30r/m;
        limit_req_status 429;
        limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
        limit_conn conn_limit 20;

        upstream game_service {
            server game-service:3001;
            keepalive 16;
        }

        upstream multiplayer_service {
            server multiplayer:3002;
            keepalive 16;
        }

        upstream ml_service {
            server ml-service:3003;
            keepalive 8;
        }

        server {
            listen 80;
            server_name _;

            location = /health {
                return 200 '{"status":"ok","service":"api-gateway"}';
                add_header Content-Type application/json;
            }

            location = /graphql {
                limit_req zone=api_limit burst=20 nodelay;
                proxy_pass         http://game_service;
                proxy_http_version 1.1;
                proxy_set_header   Host              $host;
                proxy_set_header   X-Real-IP         $remote_addr;
                proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Proto $scheme;
                proxy_set_header   Connection        "";
            }

            location ~ ^/rooms/[^/]+/ws$ {
                limit_req zone=ws_limit burst=10 nodelay;
                proxy_pass         http://multiplayer_service;
                proxy_http_version 1.1;
                proxy_set_header   Upgrade           $http_upgrade;
                proxy_set_header   Connection        $connection_upgrade;
                proxy_set_header   Host              $host;
                proxy_set_header   X-Real-IP         $remote_addr;
                proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Proto $scheme;
                proxy_read_timeout 3600s;
                proxy_send_timeout 3600s;
            }

            location /rooms {
                proxy_pass         http://multiplayer_service;
                proxy_http_version 1.1;
                proxy_set_header   Host              $host;
                proxy_set_header   X-Real-IP         $remote_addr;
                proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Proto $scheme;
                proxy_set_header   Connection        "";
            }

            location ~ ^/api/auth {
                limit_req zone=auth_limit burst=5 nodelay;
                proxy_pass         http://game_service;
                proxy_http_version 1.1;
                proxy_set_header   Host              $host;
                proxy_set_header   X-Real-IP         $remote_addr;
                proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Proto $scheme;
                proxy_set_header   Connection        "";
            }

            location /api/ {
                limit_req zone=api_limit burst=20 nodelay;
                proxy_pass         http://game_service;
                proxy_http_version 1.1;
                proxy_set_header   Host              $host;
                proxy_set_header   X-Real-IP         $remote_addr;
                proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Proto $scheme;
                proxy_set_header   Connection        "";
            }

            location /ml/ {
                rewrite            ^/ml/(.*)$ /$1 break;
                proxy_pass         http://ml_service;
                proxy_http_version 1.1;
                proxy_set_header   Host              $host;
                proxy_set_header   X-Real-IP         $remote_addr;
                proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Proto $scheme;
                proxy_set_header   Connection        "";
                proxy_read_timeout 120s;
            }

            location / {
                return 404 '{"error":"not_found","message":"Unknown route"}';
                add_header Content-Type application/json;
            }
        }
    }
{{- end }}
