{{- if .Values.nginx.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-nginx
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sudoku-ultra.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
spec:
  type: {{ .Values.nginx.service.type }}
  selector:
    {{- include "sudoku-ultra.selectorLabels" (dict "component" "nginx" "root" .) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.nginx.service.port }}
      targetPort: http
      protocol: TCP
    - name: https
      port: {{ .Values.nginx.service.httpsPort }}
      targetPort: https
      protocol: TCP
{{- end }}
