{{- if .Values.jaeger.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-jaeger
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sudoku-ultra.labels" . | nindent 4 }}
    app.kubernetes.io/component: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "sudoku-ultra.selectorLabels" (dict "component" "jaeger" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sudoku-ultra.selectorLabels" (dict "component" "jaeger" "root" .) | nindent 8 }}
    spec:
      containers:
        - name: jaeger
          image: "{{ .Values.jaeger.image.repository }}:{{ .Values.jaeger.image.tag }}"
          ports:
            - name: query
              containerPort: {{ .Values.jaeger.service.queryPort }}
            - name: otlp-grpc
              containerPort: {{ .Values.jaeger.service.collectorPort }}
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
            - name: SPAN_STORAGE_TYPE
              value: "badger"
            - name: BADGER_EPHEMERAL
              value: "false"
            - name: BADGER_DIRECTORY_VALUE
              value: "/badger/data"
            - name: BADGER_DIRECTORY_KEY
              value: "/badger/key"
          resources:
            {{- toYaml .Values.jaeger.resources | nindent 12 }}
          volumeMounts:
            - name: badger
              mountPath: /badger
      volumes:
        - name: badger
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sudoku-ultra.labels" . | nindent 4 }}
    app.kubernetes.io/component: jaeger
spec:
  selector:
    {{- include "sudoku-ultra.selectorLabels" (dict "component" "jaeger" "root" .) | nindent 4 }}
  ports:
    - name: query
      port: {{ .Values.jaeger.service.queryPort }}
      targetPort: query
    - name: otlp-grpc
      port: {{ .Values.jaeger.service.collectorPort }}
      targetPort: otlp-grpc
  type: ClusterIP
{{- end }}
