global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: sudoku-ultra
    env:     "${DEPLOY_ENV:-dev}"

# Load alerting rules
rule_files:
  - /etc/prometheus/rules/*.yml

# Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

# ── Scrape configs ────────────────────────────────────────────────────────────

scrape_configs:

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ── Application services ──────────────────────────────────────────────────

  - job_name: game-service
    metrics_path: /metrics
    static_configs:
      - targets: ["game-service:3001"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: service
        replacement: game-service

  - job_name: ml-service
    metrics_path: /metrics
    static_configs:
      - targets: ["ml-service:8003"]
    relabel_configs:
      - target_label: service
        replacement: ml-service

  - job_name: multiplayer
    metrics_path: /metrics
    static_configs:
      - targets: ["multiplayer:3002"]
    relabel_configs:
      - target_label: service
        replacement: multiplayer

  # Nginx (via nginx-prometheus-exporter or stub_status)
  - job_name: nginx
    metrics_path: /metrics
    static_configs:
      - targets: ["nginx-exporter:9113"]
    relabel_configs:
      - target_label: service
        replacement: nginx

  # ── ML pipeline ───────────────────────────────────────────────────────────

  - job_name: mlflow
    metrics_path: /metrics
    static_configs:
      - targets: ["mlflow:5001"]
    relabel_configs:
      - target_label: service
        replacement: mlflow

  - job_name: airflow
    metrics_path: /metrics
    static_configs:
      - targets: ["airflow-webserver:8080"]
    relabel_configs:
      - target_label: service
        replacement: airflow

  # ── Infrastructure ────────────────────────────────────────────────────────

  # PostgreSQL (via postgres_exporter)
  - job_name: postgres
    metrics_path: /metrics
    static_configs:
      - targets: ["postgres-exporter:9187"]
    relabel_configs:
      - target_label: service
        replacement: postgres

  # Redis (via redis_exporter)
  - job_name: redis
    metrics_path: /metrics
    static_configs:
      - targets: ["redis-exporter:9121"]
    relabel_configs:
      - target_label: service
        replacement: redis

  # Kafka (via kafka_exporter)
  - job_name: kafka
    metrics_path: /metrics
    static_configs:
      - targets: ["kafka-exporter:9308"]
    relabel_configs:
      - target_label: service
        replacement: kafka

  # MinIO (built-in /minio/v2/metrics/cluster)
  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    scheme: http
    static_configs:
      - targets: ["minio:9000"]
    relabel_configs:
      - target_label: service
        replacement: minio

  # Qdrant vector DB
  - job_name: qdrant
    metrics_path: /metrics
    static_configs:
      - targets: ["qdrant:6333"]
    relabel_configs:
      - target_label: service
        replacement: qdrant

  # cAdvisor — container resource usage
  - job_name: cadvisor
    metrics_path: /metrics
    static_configs:
      - targets: ["cadvisor:8080"]
    relabel_configs:
      - target_label: service
        replacement: cadvisor

  # Node exporter — host OS metrics (used in k8s DaemonSet, port 9100)
  - job_name: node
    metrics_path: /metrics
    static_configs:
      - targets: ["node-exporter:9100"]
    relabel_configs:
      - target_label: service
        replacement: node
