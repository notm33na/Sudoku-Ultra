groups:
  - name: sudoku-ultra-alerts
    interval: 60s
    rules:

      # ── 1. High API error rate ─────────────────────────────────────────────
      # Fires when 5xx responses exceed 5% of total requests over 5 minutes.
      - alert: HighAPIErrorRate
        expr: |
          (
            sum(rate(http_requests_total{status=~"5.."}[5m])) by (service)
            /
            sum(rate(http_requests_total[5m])) by (service)
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "High 5xx error rate on {{ $labels.service }}"
          description: >
            {{ $labels.service }} is returning {{ printf "%.1f" (mul $value 100) }}%
            5xx errors (threshold: 5%) over the last 5 minutes.
          runbook: "https://github.com/sudoku-ultra/sudoku-ultra/blob/main/docs/runbooks/high-error-rate.md"

      # ── 2. API P99 latency too high ───────────────────────────────────────
      # Fires when 99th-percentile response time exceeds 2s for 5 minutes.
      - alert: HighAPILatency
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (service, le)
          ) > 2.0
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "P99 latency > 2s on {{ $labels.service }}"
          description: >
            P99 latency on {{ $labels.service }} is {{ printf "%.2f" $value }}s
            (threshold: 2.0s). Check for slow database queries or model inference spikes.
          runbook: "https://github.com/sudoku-ultra/sudoku-ultra/blob/main/docs/runbooks/high-latency.md"

      # ── 3. ML model SLA breach ────────────────────────────────────────────
      # Fires when a model's accuracy metric drops below production SLA thresholds.
      # Metric published by ml-service /metrics after each inference batch.
      - alert: MLModelAccuracyBreach
        expr: |
          ml_model_accuracy{model="difficulty-classifier"} < 0.80
          or ml_model_auc_roc{model="churn-predictor"} < 0.72
          or ml_model_silhouette{model="skill-clustering"} < 0.38
        for: 10m
        labels:
          severity: critical
          team: ml
        annotations:
          summary: "ML model SLA breach — {{ $labels.model }}"
          description: >
            {{ $labels.model }} metric {{ $labels.metric_name }} = {{ printf "%.3f" $value }}
            is below the production SLA threshold.
            Trigger: retrain_{{ $labels.model | replace "-" "_" }} Airflow DAG.
          runbook: "https://github.com/sudoku-ultra/sudoku-ultra/blob/main/docs/mlops/model-runbook.md"

      # ── 4. WebSocket connection spike ─────────────────────────────────────
      # Fires when active WS connections exceed 4000 for 3 minutes.
      - alert: WebSocketConnectionSpike
        expr: |
          multiplayer_active_connections > 4000
        for: 3m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "WebSocket connections spike: {{ $value }}"
          description: >
            Active WebSocket connections on the multiplayer service reached {{ $value }}
            (threshold: 4000). Consider scaling up or checking for connection leaks.
          runbook: "https://github.com/sudoku-ultra/sudoku-ultra/blob/main/docs/runbooks/websocket-spike.md"

      # ── 5. PostgreSQL slow queries ────────────────────────────────────────
      # Fires when avg query duration exceeds 500ms over 5 minutes.
      - alert: PostgresSlowQueries
        expr: |
          rate(pg_stat_activity_max_tx_duration{datname="sudoku_ultra"}[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
          team: data
        annotations:
          summary: "PostgreSQL slow queries detected"
          description: >
            Average transaction duration in sudoku_ultra DB is {{ printf "%.2f" $value }}s
            (threshold: 0.5s). Check pg_stat_activity for long-running queries.
          runbook: "https://github.com/sudoku-ultra/sudoku-ultra/blob/main/docs/runbooks/postgres-slow-queries.md"

      # ── 6. Pod OOMKilled ──────────────────────────────────────────────────
      # Fires when any container has been OOMKilled at least once in 15 minutes.
      - alert: PodOOMKilled
        expr: |
          increase(kube_pod_container_status_restarts_total[15m]) > 0
          and on (pod, namespace)
          kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
        for: 0m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Pod OOMKilled: {{ $labels.pod }} in {{ $labels.namespace }}"
          description: >
            Container {{ $labels.container }} in pod {{ $labels.pod }}
            (namespace: {{ $labels.namespace }}) was OOMKilled.
            Check memory limits and consider increasing them or fixing memory leaks.
          runbook: "https://github.com/sudoku-ultra/sudoku-ultra/blob/main/docs/runbooks/oomkilled.md"
