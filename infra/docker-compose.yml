# ──────────────────────────────────────────────────────────────────────────────
# Sudoku Ultra — Docker Compose (Local Development)
# ──────────────────────────────────────────────────────────────────────────────
# Usage: cd infra && docker compose up -d
# Dashboard: http://localhost:8080 (nginx gateway)
# Airflow:   http://localhost:8083 (admin / admin)
# MLflow:    http://localhost:5000

version: "3.9"

# ── Shared Airflow environment ─────────────────────────────────────────────────
x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.11
  restart: unless-stopped
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://sudoku:sudoku_dev_password@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0jKc3SY="
    AIRFLOW__WEBSERVER__SECRET_KEY: "dev-airflow-webserver-secret"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__LOGGING__LOGGING_LEVEL: WARNING
    # DAG-accessible variables
    AIRFLOW_VAR_DATABASE_URL: postgresql://sudoku:sudoku_dev_password@postgres:5432/sudoku_ultra
    AIRFLOW_VAR_ML_SERVICE_URL: http://ml-service:3003
    AIRFLOW_VAR_GAME_SERVICE_URL: http://game-service:3001
    AIRFLOW_VAR_DUCKDB_PATH: /app/data/analytics.duckdb
    AIRFLOW_VAR_MLFLOW_TRACKING_URI: http://mlflow:5000
    AIRFLOW_VAR_MLFLOW_EXPERIMENT: sudoku-ultra
    MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    AWS_ACCESS_KEY_ID: minioadmin
    AWS_SECRET_ACCESS_KEY: minioadmin
    COMPETITIVE_DUCKDB_PATH: /app/data/competitive.duckdb
    EVENTS_DIR: /app/data/events
  volumes:
    - ../ml/pipelines:/opt/airflow/dags:ro
    - ../airflow/dags:/opt/airflow/dags/competitive:ro
    - airflow_logs:/opt/airflow/logs
    - duckdb_data:/app/data
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sudoku-ultra-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sudoku
      POSTGRES_PASSWORD: sudoku_dev_password
      POSTGRES_DB: sudoku_ultra
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sudoku -d sudoku_ultra"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: sudoku-ultra-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: sudoku
      MONGO_INITDB_ROOT_PASSWORD: sudoku_dev_password
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sudoku-ultra-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka (KRaft mode — no Zookeeper) ────────────────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    container_name: sudoku-ultra-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_LOG_RETENTION_HOURS: 168  # 7 days
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --list --bootstrap-server localhost:9092 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Game Service ─────────────────────────────────────────────────────────────
  game-service:
    build:
      context: ..
      dockerfile: services/game-service/Dockerfile
    container_name: sudoku-ultra-game-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://sudoku:sudoku_dev_password@postgres:5432/sudoku_ultra
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      KAFKA_BROKERS: kafka:9092
      ML_SERVICE_URL: http://ml-service:3003
      REDIS_URL: redis://redis:6379
      INTERNAL_SECRET: ${INTERNAL_SECRET:-dev-internal-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── ML Service ───────────────────────────────────────────────────────────────
  ml-service:
    build:
      context: ../services/ml-service
      dockerfile: Dockerfile
    container_name: sudoku-ultra-ml-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      ENV: production
      LOG_LEVEL: INFO
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      DATABASE_URL: postgresql://sudoku:sudoku_dev_password@postgres:5432/sudoku_ultra
      GAME_SERVICE_URL: http://game-service:3001
      DUCKDB_PATH: /app/data/analytics.duckdb
      COMPETITIVE_DUCKDB_PATH: /app/data/competitive.duckdb
      EVENTS_DIR: /app/data/events
      KAFKA_BROKERS: kafka:9092
      ANOMALY_ENRICH: "1"
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
    volumes:
      - ml_models:/app/ml/models
      - duckdb_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3003/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Multiplayer Service ──────────────────────────────────────────────────────
  multiplayer:
    build:
      context: ../services/multiplayer
      dockerfile: Dockerfile
    container_name: sudoku-ultra-multiplayer
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      GAME_SERVICE_URL: http://game-service:3001
      BOT_SERVICE_URL: http://ml-service:3003
      ML_SERVICE_URL: http://ml-service:3003
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-dev-internal-secret-change-in-production}
      LOG_LEVEL: info
    depends_on:
      redis:
        condition: service_healthy
      game-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Kafka Consumer (ML enrichment) ───────────────────────────────────────────
  kafka-consumer:
    build:
      context: ../services/ml-service
      dockerfile: Dockerfile
    container_name: sudoku-ultra-kafka-consumer
    restart: unless-stopped
    command: ["python", "-m", "app.ml.kafka_consumer"]
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_GROUP_ID: ml-service-enrichment
      EVENTS_DIR: /app/data/events
      ANOMALY_ENRICH: "1"
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - ml_models:/app/ml/models
      - duckdb_data:/app/data
    depends_on:
      kafka:
        condition: service_healthy
      ml-service:
        condition: service_healthy

  # ── Qdrant Vector DB ──────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: sudoku-ultra-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant technique seed (one-shot init) ────────────────────────────────────
  qdrant-seed:
    image: python:3.11-slim
    container_name: sudoku-ultra-qdrant-seed
    restart: "no"
    working_dir: /app
    volumes:
      - ../ml/scripts:/app/scripts:ro
    environment:
      QDRANT_URL: http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_healthy
    command: >
      bash -c "
        pip install --quiet qdrant-client==1.10.1 sentence-transformers==3.1.1 &&
        python scripts/seed_techniques.py --qdrant-url http://qdrant:6333 --reset
      "

  # ── Ollama (local LLM) ────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:0.3.12
    container_name: sudoku-ultra-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s

  # ── Notification Service ─────────────────────────────────────────────────────
  notification-service:
    build:
      context: ../services/notifications
      dockerfile: Dockerfile
    container_name: sudoku-ultra-notifications
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      DATABASE_URL: postgresql://sudoku:sudoku_dev_password@postgres:5432/sudoku_ultra
      # Set these in .env for FCM to work:
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3004/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── MinIO (S3-compatible artifact store) ─────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-07-04T14-25-45Z
    container_name: sudoku-ultra-minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console  →  http://localhost:9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket init (one-shot) ──────────────────────────────────────────────
  minio-init:
    image: minio/mc:RELEASE.2024-07-03T20-17-25Z
    container_name: sudoku-ultra-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/mlflow-artifacts &&
        mc mb --ignore-existing local/training-data &&
        mc mb --ignore-existing local/model-exports &&
        echo 'MinIO buckets ready.'
      "

  # ── MLflow Tracking Server ──────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.0
    container_name: sudoku-ultra-mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql+psycopg2://sudoku:sudoku_dev_password@postgres:5432/mlflow
      MLFLOW_DEFAULT_ARTIFACT_ROOT: s3://mlflow-artifacts
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql+psycopg2://sudoku:sudoku_dev_password@postgres:5432/mlflow
      --default-artifact-root s3://mlflow-artifacts

  # ── Airflow — DB Init (runs once) ────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: sudoku-ultra-airflow-init
    restart: "no"
    environment:
      <<: *airflow-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _AIRFLOW_WWW_USER_EMAIL: admin@sudoku.ultra
      _AIRFLOW_WWW_USER_FIRSTNAME: Admin
      _AIRFLOW_WWW_USER_LASTNAME: User
      _AIRFLOW_WWW_USER_ROLE: Admin
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install --quiet duckdb psycopg2-binary requests mlflow==2.14.0 boto3==1.34.144 great-expectations==0.18.14 &&
        airflow db migrate &&
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@sudoku.ultra || true

  # ── Airflow — Webserver ──────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: sudoku-ultra-airflow-webserver
    ports:
      - "8083:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  # ── Airflow — Scheduler ──────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: sudoku-ultra-airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  # ── Web Admin Dashboard ─────────────────────────────────────────────────────
  web-admin:
    build:
      context: ../apps/web-admin
      dockerfile: Dockerfile
    container_name: sudoku-ultra-web-admin
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      DATABASE_URL: postgresql://sudoku:sudoku_dev_password@postgres:5432/sudoku_ultra
      ML_SERVICE_URL: http://ml-service:3003
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3005/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Observability Stack ─────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: sudoku-ultra-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
      - --web.enable-admin-api

  grafana:
    image: grafana/grafana:11.2.0
    container_name: sudoku-ultra-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-sudoku_dev}"
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/app.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:3.1.0
    container_name: sudoku-ultra-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yml

  promtail:
    image: grafana/promtail:3.1.0
    container_name: sudoku-ultra-promtail
    restart: unless-stopped
    volumes:
      - ./promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.107.0
    container_name: sudoku-ultra-otel-collector
    restart: unless-stopped
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics scraped by Prometheus
    volumes:
      - ./otel-collector/otel-collector.yml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - jaeger
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: sudoku-ultra-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"   # Jaeger UI
      - "14250:14250"   # gRPC model port
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  # ── Nginx API Gateway ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: sudoku-ultra-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      game-service:
        condition: service_healthy
      multiplayer:
        condition: service_healthy

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  kafka_data:
  ml_models:
  mlflow_data:
  minio_data:
  airflow_logs:
  duckdb_data:
  qdrant_data:
  ollama_data:
  prometheus_data:
  grafana_data:
  loki_data:
