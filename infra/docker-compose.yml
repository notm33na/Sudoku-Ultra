# ──────────────────────────────────────────────────────────────────────────────
# Sudoku Ultra — Docker Compose (Local Development)
# ──────────────────────────────────────────────────────────────────────────────
# Usage: cd infra && docker compose up -d
# Dashboard: http://localhost:8080 (nginx gateway)

version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sudoku-ultra-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sudoku
      POSTGRES_PASSWORD: sudoku_dev_password
      POSTGRES_DB: sudoku_ultra
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sudoku -d sudoku_ultra"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: sudoku-ultra-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: sudoku
      MONGO_INITDB_ROOT_PASSWORD: sudoku_dev_password
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sudoku-ultra-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Game Service ─────────────────────────────────────────────────────────────
  game-service:
    build:
      context: ..
      dockerfile: services/game-service/Dockerfile
    container_name: sudoku-ultra-game-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://sudoku:sudoku_dev_password@postgres:5432/sudoku_ultra
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Nginx API Gateway ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: sudoku-ultra-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      game-service:
        condition: service_healthy

volumes:
  postgres_data:
  mongo_data:
  redis_data:
