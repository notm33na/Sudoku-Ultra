# ──────────────────────────────────────────────────────────────────────────────
# Sudoku Ultra — Docker Compose (Local Development)
# ──────────────────────────────────────────────────────────────────────────────
# Usage: cd infra && docker compose up -d
# Dashboard: http://localhost:8080 (nginx gateway)
# Airflow:   http://localhost:8083 (admin / admin)
# MLflow:    http://localhost:5000

version: "3.9"

# ── Shared Airflow environment ─────────────────────────────────────────────────
x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.11
  restart: unless-stopped
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://sudoku:sudoku_dev_password@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0jKc3SY="
    AIRFLOW__WEBSERVER__SECRET_KEY: "dev-airflow-webserver-secret"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__LOGGING__LOGGING_LEVEL: WARNING
    # DAG-accessible variables
    AIRFLOW_VAR_DATABASE_URL: postgresql://sudoku:sudoku_dev_password@postgres:5432/sudoku_ultra
    AIRFLOW_VAR_ML_SERVICE_URL: http://ml-service:3003
    AIRFLOW_VAR_GAME_SERVICE_URL: http://game-service:3001
    AIRFLOW_VAR_DUCKDB_PATH: /app/data/analytics.duckdb
    COMPETITIVE_DUCKDB_PATH: /app/data/competitive.duckdb
    EVENTS_DIR: /app/data/events
  volumes:
    - ../ml/pipelines:/opt/airflow/dags:ro
    - ../airflow/dags:/opt/airflow/dags/competitive:ro
    - airflow_logs:/opt/airflow/logs
    - duckdb_data:/app/data
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sudoku-ultra-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sudoku
      POSTGRES_PASSWORD: sudoku_dev_password
      POSTGRES_DB: sudoku_ultra
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sudoku -d sudoku_ultra"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: sudoku-ultra-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: sudoku
      MONGO_INITDB_ROOT_PASSWORD: sudoku_dev_password
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sudoku-ultra-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka (KRaft mode — no Zookeeper) ────────────────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    container_name: sudoku-ultra-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_LOG_RETENTION_HOURS: 168  # 7 days
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --list --bootstrap-server localhost:9092 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Game Service ─────────────────────────────────────────────────────────────
  game-service:
    build:
      context: ..
      dockerfile: services/game-service/Dockerfile
    container_name: sudoku-ultra-game-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://sudoku:sudoku_dev_password@postgres:5432/sudoku_ultra
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      KAFKA_BROKERS: kafka:9092
      ML_SERVICE_URL: http://ml-service:3003
      REDIS_URL: redis://redis:6379
      INTERNAL_SECRET: ${INTERNAL_SECRET:-dev-internal-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── ML Service ───────────────────────────────────────────────────────────────
  ml-service:
    build:
      context: ../services/ml-service
      dockerfile: Dockerfile
    container_name: sudoku-ultra-ml-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      ENV: production
      LOG_LEVEL: INFO
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DATABASE_URL: postgresql://sudoku:sudoku_dev_password@postgres:5432/sudoku_ultra
      GAME_SERVICE_URL: http://game-service:3001
      DUCKDB_PATH: /app/data/analytics.duckdb
      COMPETITIVE_DUCKDB_PATH: /app/data/competitive.duckdb
      EVENTS_DIR: /app/data/events
      KAFKA_BROKERS: kafka:9092
      ANOMALY_ENRICH: "1"
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
    volumes:
      - ml_models:/app/ml/models
      - duckdb_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3003/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Multiplayer Service ──────────────────────────────────────────────────────
  multiplayer:
    build:
      context: ../services/multiplayer
      dockerfile: Dockerfile
    container_name: sudoku-ultra-multiplayer
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      GAME_SERVICE_URL: http://game-service:3001
      BOT_SERVICE_URL: http://ml-service:3003
      ML_SERVICE_URL: http://ml-service:3003
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-dev-internal-secret-change-in-production}
      LOG_LEVEL: info
    depends_on:
      redis:
        condition: service_healthy
      game-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Kafka Consumer (ML enrichment) ───────────────────────────────────────────
  kafka-consumer:
    build:
      context: ../services/ml-service
      dockerfile: Dockerfile
    container_name: sudoku-ultra-kafka-consumer
    restart: unless-stopped
    command: ["python", "-m", "app.ml.kafka_consumer"]
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_GROUP_ID: ml-service-enrichment
      EVENTS_DIR: /app/data/events
      ANOMALY_ENRICH: "1"
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ml_models:/app/ml/models
      - duckdb_data:/app/data
    depends_on:
      kafka:
        condition: service_healthy
      ml-service:
        condition: service_healthy

  # ── Qdrant Vector DB ──────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: sudoku-ultra-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama (local LLM) ────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:0.3.12
    container_name: sudoku-ultra-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s

  # ── Notification Service ─────────────────────────────────────────────────────
  notification-service:
    build:
      context: ../services/notifications
      dockerfile: Dockerfile
    container_name: sudoku-ultra-notifications
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      DATABASE_URL: postgresql://sudoku:sudoku_dev_password@postgres:5432/sudoku_ultra
      # Set these in .env for FCM to work:
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3004/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── MLflow Tracking Server ──────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.0
    container_name: sudoku-ultra-mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: sqlite:///mlflow/mlflow.db
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts

  # ── Airflow — DB Init (runs once) ────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: sudoku-ultra-airflow-init
    restart: "no"
    environment:
      <<: *airflow-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _AIRFLOW_WWW_USER_EMAIL: admin@sudoku.ultra
      _AIRFLOW_WWW_USER_FIRSTNAME: Admin
      _AIRFLOW_WWW_USER_LASTNAME: User
      _AIRFLOW_WWW_USER_ROLE: Admin
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install --quiet duckdb psycopg2-binary requests &&
        airflow db migrate &&
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@sudoku.ultra || true

  # ── Airflow — Webserver ──────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: sudoku-ultra-airflow-webserver
    ports:
      - "8083:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  # ── Airflow — Scheduler ──────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: sudoku-ultra-airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  # ── Web Admin Dashboard ─────────────────────────────────────────────────────
  web-admin:
    build:
      context: ../apps/web-admin
      dockerfile: Dockerfile
    container_name: sudoku-ultra-web-admin
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      DATABASE_URL: postgresql://sudoku:sudoku_dev_password@postgres:5432/sudoku_ultra
      ML_SERVICE_URL: http://ml-service:3003
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3005/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Nginx API Gateway ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: sudoku-ultra-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      game-service:
        condition: service_healthy
      multiplayer:
        condition: service_healthy

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  kafka_data:
  ml_models:
  mlflow_data:
  airflow_logs:
  duckdb_data:
  qdrant_data:
  ollama_data:
