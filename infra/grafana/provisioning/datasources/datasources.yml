apiVersion: 1

datasources:
  - name:   Prometheus
    type:   prometheus
    uid:    prometheus
    url:    http://prometheus:9090
    access: proxy
    isDefault: true
    jsonData:
      timeInterval: "15s"

  - name:   Loki
    type:   loki
    uid:    loki
    url:    http://loki:3100
    access: proxy
    jsonData:
      maxLines: 1000
      derivedFields:
        - name:        TraceID
          matcherRegex: '"trace_id":"([^"]+)"'
          url:         "http://jaeger:16686/trace/$${__value.raw}"
          datasourceUid: jaeger

  - name:   Jaeger
    type:   jaeger
    uid:    jaeger
    url:    http://jaeger:16686
    access: proxy
