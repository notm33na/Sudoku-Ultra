<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sudoku Ultra — Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.25rem; font-weight: 700; color: #a78bfa; }
    header span { font-size: 0.8rem; color: #64748b; }

    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px;
      display: grid;
      gap: 24px;
    }

    /* KPI row */
    .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .kpi {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 20px;
    }
    .kpi-label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .kpi-value { font-size: 2rem; font-weight: 700; color: #a78bfa; margin-top: 4px; }
    .kpi-sub { font-size: 0.75rem; color: #64748b; margin-top: 2px; }

    /* Chart cards */
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 24px;
    }
    .card h2 { font-size: 0.9rem; font-weight: 600; color: #94a3b8; margin-bottom: 16px; }

    /* Cluster donut */
    #cluster-chart { display: flex; align-items: center; gap: 24px; }
    #cluster-donut { flex-shrink: 0; }
    #cluster-legend { flex: 1; }
    .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 0.85rem; }
    .legend-swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
    .legend-pct { margin-left: auto; color: #94a3b8; font-size: 0.75rem; }

    /* Tooltip */
    .tooltip {
      position: fixed;
      background: #1e2130;
      border: 1px solid #3d4266;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.8rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 999;
    }

    /* User table */
    .table-controls {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .table-controls select, .table-controls input {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 8px 12px;
      font-size: 0.85rem;
    }
    .table-controls button {
      background: #7c3aed;
      border: none;
      border-radius: 8px;
      color: #fff;
      padding: 8px 16px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th {
      text-align: left;
      padding: 10px 12px;
      background: #0f1117;
      color: #64748b;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #2d3148;
    }
    td { padding: 10px 12px; border-bottom: 1px solid #1e2130; }
    tr:hover td { background: #1e2130; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    /* Loading / error */
    .loading { color: #64748b; font-size: 0.85rem; }
    .error { color: #f87171; font-size: 0.85rem; }
  </style>
</head>
<body>

<header>
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
    <rect x="2" y="2" width="9" height="9" rx="2" fill="#a78bfa"/>
    <rect x="13" y="2" width="9" height="9" rx="2" fill="#7c3aed"/>
    <rect x="2" y="13" width="9" height="9" rx="2" fill="#7c3aed"/>
    <rect x="13" y="13" width="9" height="9" rx="2" fill="#a78bfa"/>
  </svg>
  <h1>Sudoku Ultra Admin</h1>
  <span id="last-updated"></span>
</header>

<main>

  <!-- KPI Row -->
  <div class="kpi-row">
    <div class="kpi">
      <div class="kpi-label">Daily Active Users</div>
      <div class="kpi-value" id="kpi-dau">—</div>
      <div class="kpi-sub" id="kpi-dau-new"></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Total Users</div>
      <div class="kpi-value" id="kpi-users">—</div>
      <div class="kpi-sub">registered</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Completion Rate</div>
      <div class="kpi-value" id="kpi-completion">—</div>
      <div class="kpi-sub">today's puzzles</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Top Difficulty</div>
      <div class="kpi-value" id="kpi-difficulty">—</div>
      <div class="kpi-sub">most played (7d)</div>
    </div>
  </div>

  <!-- Charts Row -->
  <div class="charts-row">

    <!-- Skill Cluster Donut -->
    <div class="card">
      <h2>Skill Cluster Distribution</h2>
      <div id="cluster-chart">
        <svg id="cluster-donut"></svg>
        <div id="cluster-legend"></div>
      </div>
    </div>

    <!-- Difficulty Popularity Bar -->
    <div class="card">
      <h2>Difficulty Popularity (last 7 days)</h2>
      <svg id="difficulty-bar" width="100%" height="220"></svg>
    </div>

  </div>

  <!-- User Table -->
  <div class="card">
    <h2>User Drill-down</h2>
    <div class="table-controls">
      <select id="filter-cluster">
        <option value="">All Clusters</option>
        <option>Beginner</option>
        <option>Casual</option>
        <option>Intermediate</option>
        <option>Advanced</option>
        <option>Expert</option>
        <option value="Unassigned">Unassigned</option>
      </select>
      <button onclick="loadUsers()">Refresh</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>Username</th>
          <th>Cluster</th>
          <th>Streak</th>
          <th>Games</th>
          <th>Completed</th>
          <th>Joined</th>
        </tr>
      </thead>
      <tbody id="user-table-body">
        <tr><td colspan="6" class="loading">Loading users...</td></tr>
      </tbody>
    </table>
  </div>

</main>

<div class="tooltip" id="tooltip"></div>

<script>
// ─── Config ────────────────────────────────────────────────────────────────

const CLUSTER_COLORS = {
  Beginner:     '#22d3ee',
  Casual:       '#34d399',
  Intermediate: '#a78bfa',
  Advanced:     '#f59e0b',
  Expert:       '#f87171',
  Unassigned:   '#475569',
};

const tooltip = document.getElementById('tooltip');

function showTip(html, event) {
  tooltip.innerHTML = html;
  tooltip.style.opacity = 1;
  tooltip.style.left = (event.clientX + 12) + 'px';
  tooltip.style.top  = (event.clientY - 8) + 'px';
}
function hideTip() { tooltip.style.opacity = 0; }

// ─── Fetch helpers ─────────────────────────────────────────────────────────

async function get(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return r.json();
}

// ─── KPI ───────────────────────────────────────────────────────────────────

async function loadKPIs() {
  // DAU from ml-service analytics
  try {
    const dau = await get('/api/analytics/dau?days=1');
    if (dau[0]) {
      document.getElementById('kpi-dau').textContent = dau[0].user_count ?? '—';
      const n = dau[0].new_user_count;
      document.getElementById('kpi-dau-new').textContent = n ? `+${n} new today` : 'today';
    }
  } catch { document.getElementById('kpi-dau').textContent = 'N/A'; }

  // Total users
  try {
    const clusters = await get('/api/clusters');
    const total = clusters.reduce((s, c) => s + c.count, 0);
    document.getElementById('kpi-users').textContent = total.toLocaleString();
  } catch {}

  // Completion rate from analytics
  try {
    const rates = await get('/api/analytics/completion-rates');
    if (rates.length) {
      const total = rates.reduce((s, r) => s + r.started_count, 0);
      const done  = rates.reduce((s, r) => s + r.completed_count, 0);
      const pct   = total > 0 ? Math.round(done / total * 100) : 0;
      document.getElementById('kpi-completion').textContent = pct + '%';
    }
  } catch {}

  // Top difficulty
  try {
    const pop = await get('/api/analytics/difficulty-popularity?days=7');
    if (pop[0]) document.getElementById('kpi-difficulty').textContent = pop[0].difficulty;
  } catch {}
}

// ─── Cluster Donut ─────────────────────────────────────────────────────────

async function renderClusterDonut() {
  const data = await get('/api/clusters');
  const total = data.reduce((s, d) => s + d.count, 0);

  const W = 180, H = 180, R = 80, IR = 50;
  const svg = d3.select('#cluster-donut')
    .attr('width', W).attr('height', H);

  const arc = d3.arc().innerRadius(IR).outerRadius(R);
  const pie = d3.pie().value(d => d.count).sort(null);

  const g = svg.append('g').attr('transform', `translate(${W/2},${H/2})`);

  g.selectAll('path')
    .data(pie(data))
    .join('path')
      .attr('d', arc)
      .attr('fill', d => CLUSTER_COLORS[d.data.cluster] ?? '#475569')
      .attr('stroke', '#0f1117')
      .attr('stroke-width', 2)
      .on('mousemove', (event, d) => {
        const pct = (d.data.count / total * 100).toFixed(1);
        showTip(`<b>${d.data.cluster}</b>: ${d.data.count.toLocaleString()} (${pct}%)`, event);
      })
      .on('mouseleave', hideTip);

  // Centre label
  g.append('text').attr('text-anchor', 'middle').attr('dy', '-0.2em')
    .attr('fill', '#e2e8f0').attr('font-size', '1.4rem').attr('font-weight', '700')
    .text(total.toLocaleString());
  g.append('text').attr('text-anchor', 'middle').attr('dy', '1.2em')
    .attr('fill', '#64748b').attr('font-size', '0.7rem')
    .text('users');

  // Legend
  const legend = document.getElementById('cluster-legend');
  legend.innerHTML = data.map(d => {
    const pct = total > 0 ? (d.count / total * 100).toFixed(1) : '0.0';
    const color = CLUSTER_COLORS[d.cluster] ?? '#475569';
    return `<div class="legend-item">
      <div class="legend-swatch" style="background:${color}"></div>
      <span>${d.cluster}</span>
      <span class="legend-pct">${d.count.toLocaleString()} &nbsp;${pct}%</span>
    </div>`;
  }).join('');
}

// ─── Difficulty Popularity Bar ─────────────────────────────────────────────

async function renderDifficultyBar() {
  const data = await get('/api/analytics/difficulty-popularity?days=7');
  if (!data.length) return;

  const container = document.getElementById('difficulty-bar');
  const W = container.getBoundingClientRect().width || 400;
  const H = 220;
  const margin = { top: 10, right: 20, bottom: 40, left: 50 };
  const innerW = W - margin.left - margin.right;
  const innerH = H - margin.top - margin.bottom;

  const svg = d3.select('#difficulty-bar')
    .attr('width', W).attr('height', H);

  const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  const x = d3.scaleBand().domain(data.map(d => d.difficulty)).range([0, innerW]).padding(0.3);
  const y = d3.scaleLinear().domain([0, d3.max(data, d => d.total_plays)]).nice().range([innerH, 0]);

  // Axes
  g.append('g').attr('transform', `translate(0,${innerH})`)
    .call(d3.axisBottom(x).tickSize(0))
    .call(ax => { ax.select('.domain').remove(); ax.selectAll('text').attr('fill', '#94a3b8').attr('font-size', '0.72rem'); });

  g.append('g')
    .call(d3.axisLeft(y).ticks(4).tickSize(-innerW))
    .call(ax => {
      ax.select('.domain').remove();
      ax.selectAll('.tick line').attr('stroke', '#2d3148');
      ax.selectAll('text').attr('fill', '#64748b').attr('font-size', '0.7rem');
    });

  // Bars
  g.selectAll('rect')
    .data(data)
    .join('rect')
      .attr('x', d => x(d.difficulty))
      .attr('y', d => y(d.total_plays))
      .attr('width', x.bandwidth())
      .attr('height', d => innerH - y(d.total_plays))
      .attr('fill', d => CLUSTER_COLORS[d.difficulty] ?? '#a78bfa')
      .attr('rx', 4)
      .on('mousemove', (event, d) => showTip(`<b>${d.difficulty}</b>: ${d.total_plays.toLocaleString()} plays`, event))
      .on('mouseleave', hideTip);
}

// ─── User Table ─────────────────────────────────────────────────────────────

async function loadUsers() {
  const cluster = document.getElementById('filter-cluster').value;
  const tbody = document.getElementById('user-table-body');
  tbody.innerHTML = '<tr><td colspan="6" class="loading">Loading...</td></tr>';

  try {
    const url = '/api/users?limit=50' + (cluster ? `&cluster=${encodeURIComponent(cluster)}` : '');
    const rows = await get(url);

    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="color:#64748b;padding:16px">No users found.</td></tr>';
      return;
    }

    tbody.innerHTML = rows.map(u => {
      const color = CLUSTER_COLORS[u.skill_cluster] ?? '#475569';
      const cluster = u.skill_cluster
        ? `<span class="badge" style="background:${color}22;color:${color}">${u.skill_cluster}</span>`
        : '<span style="color:#475569">—</span>';
      const joined = new Date(u.created_at).toLocaleDateString();
      const completion = u.total_games > 0
        ? Math.round(u.completed_games / u.total_games * 100) + '%'
        : '—';
      return `<tr>
        <td>${escHtml(u.username)}</td>
        <td>${cluster}</td>
        <td>${u.current_streak} <span style="color:#64748b;font-size:0.72rem">/ ${u.longest_streak} best</span></td>
        <td>${u.total_games}</td>
        <td>${completion}</td>
        <td>${joined}</td>
      </tr>`;
    }).join('');
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="6" class="error">Error: ${escHtml(String(err))}</td></tr>`;
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Boot ───────────────────────────────────────────────────────────────────

async function init() {
  document.getElementById('last-updated').textContent =
    'Updated ' + new Date().toLocaleTimeString();

  await Promise.allSettled([
    loadKPIs(),
    renderClusterDonut(),
    renderDifficultyBar(),
    loadUsers(),
  ]);
}

init();
// Auto-refresh every 2 minutes
setInterval(init, 120_000);
</script>
</body>
</html>
